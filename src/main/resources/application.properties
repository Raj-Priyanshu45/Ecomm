spring.application.name=second

# ── DATABASE (YOUR APP DB) ─────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:4306/product_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Keycloak (AUTH ONLY) ──────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/ecomApp

# ── File upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── Async ─────────────────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100

# ── Logging ───────────────────────────────────────────────────
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=WARN

# ── Server ────────────────────────────────────────────────────
server.port=8080