spring.application.name=second

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecomdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Keycloak / OAuth2 ─────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/ecomApp

# ── File upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── Async / Thread pool ───────────────────────────────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.ecommerce=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always