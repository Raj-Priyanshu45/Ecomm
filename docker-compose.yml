services:

  keycloak-mysql:
    container_name: keycloak-ecom
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: root
    volumes:
      - ./volume-dat/mysql_keycloak_data:/var/lib/mysql
    ports:
      - "4306:3306"

  keycloak:
    container_name: keycloak-admin
    image: quay.io/keycloak/keycloak:26.5.4
    command: ["start-dev"]
    environment:
      KC_DB: mysql
      KC_DB_URL_HOST: keycloak-mysql
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: root
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_SMTP_HOST: smtp.gmail.com
      KC_SMTP_PORT: 587
      KC_SMTP_FROM: devxpriyanshu@gmail.com
      KC_SMTP_FROM_DISPLAY_NAME: Ecom App
      KC_SMTP_AUTH: "true"
      KC_SMTP_STARTTLS: "true"
      KC_SMTP_USER: devxpriyanshu@gmail.com
      KC_SMTP_PASSWORD: tkau cajt ltto zuvc
    ports:
      - "8181:8080"
    depends_on:
      - keycloak-mysql