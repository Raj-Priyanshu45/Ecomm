<div class="min-h-[calc(100vh-64px)] relative overflow-hidden bg-[#0f172a] py-10 px-4 flex justify-center items-start">
  
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full mix-blend-screen filter blur-[100px] bg-indigo-600/40 animate-pulse-slow"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full mix-blend-screen filter blur-[100px] bg-fuchsia-600/40 animate-pulse-slow" style="animation-delay: 2s;"></div>
  
  <div class="w-full max-w-3xl relative z-10 transition-all duration-500 mt-4 sm:mt-10">

    <button routerLink="/seller/products" class="mb-6 flex items-center text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
      </svg>
      Back to Products
    </button>

    @if (success) {
      <div class="mb-6 bg-emerald-500/10 border border-emerald-500/50 backdrop-blur-md text-emerald-300
                  px-5 py-4 rounded-2xl text-sm font-semibold shadow-2xl animate-fade-in flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        Product updated successfully! Returning...
      </div>
    }

    @if (error) {
      <div class="mb-6 bg-red-500/10 border border-red-500/50 backdrop-blur-md text-red-300 
                  px-5 py-4 rounded-2xl text-sm font-semibold shadow-2xl animate-fade-in flex items-start gap-3">
        <div class="w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        </div>
        <span class="mt-1">{{ error }}</span>
      </div>
    }

    <div class="bg-white/10 backdrop-blur-3xl rounded-[2rem] shadow-2xl border border-white/10 p-6 sm:p-10 animate-fade-in ring-1 ring-white/5 relative overflow-hidden">
      <div class="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-white/30 to-transparent"></div>
      
      <div *ngIf="loading" class="flex justify-center items-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-fuchsia-500"></div>
      </div>

      <div *ngIf="!loading">
        <div class="mb-10 text-center">
          <h1 class="text-3xl sm:text-4xl font-extrabold text-white mb-2 tracking-tight">Edit Product</h1>
          <p class="text-indigo-200/70 text-sm font-medium">Use the Image Manager below the save button for image changes.</p>
        </div>

        <div class="space-y-6">
          <div>
            <label class="block text-xs font-bold tracking-wider text-indigo-300 uppercase mb-2 ml-1">Product Name <span class="text-fuchsia-400">*</span></label>
            <div class="relative group">
              <input
                [(ngModel)]="name"
                placeholder="Product Name"
                class="w-full px-5 py-4 rounded-2xl bg-[#0f172a]/50 border border-white/10 text-white
                       focus:outline-none focus:ring-2 focus:ring-fuchsia-500/50 focus:border-fuchsia-500/50
                       focus:bg-[#0f172a]/80 shadow-inner transition-all placeholder:text-white/20"
              />
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold tracking-wider text-indigo-300 uppercase mb-2 ml-1">Description <span class="text-fuchsia-400">*</span></label>
            <div class="relative group">
              <textarea
                [(ngModel)]="description"
                rows="4"
                placeholder="Product Description"
                class="w-full px-5 py-4 rounded-2xl bg-[#0f172a]/50 border border-white/10 text-white
                       focus:outline-none focus:ring-2 focus:ring-fuchsia-500/50 focus:border-fuchsia-500/50
                       focus:bg-[#0f172a]/80 shadow-inner transition-all resize-none placeholder:text-white/20"
              ></textarea>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold tracking-wider text-indigo-300 uppercase mb-2 ml-1">Price <span class="text-fuchsia-400">*</span></label>
              <div class="relative group">
                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-white/40 font-bold group-focus-within:text-fuchsia-400 transition-colors">₹</span>
                <input
                  [(ngModel)]="price"
                  type="number"
                  min="1"
                  placeholder="0.00"
                  class="w-full pl-10 pr-5 py-4 rounded-2xl bg-[#0f172a]/50 border border-white/10 text-white
                         focus:outline-none focus:ring-2 focus:ring-fuchsia-500/50 focus:border-fuchsia-500/50
                         focus:bg-[#0f172a]/80 shadow-inner transition-all placeholder:text-white/20"
                />
              </div>
            </div>

            <div>
              <label class="block text-xs font-bold tracking-wider text-indigo-300 uppercase mb-2 ml-1">Quantity <span class="text-fuchsia-400">*</span></label>
              <div class="relative group">
                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-white/40 group-focus-within:text-fuchsia-400 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                  </svg>
                </span>
                <input
                  [(ngModel)]="quantity"
                  type="number"
                  min="1"
                  placeholder="0"
                  class="w-full pl-12 pr-5 py-4 rounded-2xl bg-[#0f172a]/50 border border-white/10 text-white
                         focus:outline-none focus:ring-2 focus:ring-fuchsia-500/50 focus:border-fuchsia-500/50
                         focus:bg-[#0f172a]/80 shadow-inner transition-all placeholder:text-white/20"
                />
              </div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold tracking-wider text-indigo-300 uppercase mb-2 ml-1">Tags (Comma Separated)</label>
            <div class="relative group">
              <input
                [(ngModel)]="tagsInput"
                placeholder="tech, gadgets, sale"
                class="w-full px-5 py-4 rounded-2xl bg-[#0f172a]/50 border border-white/10 text-white
                       focus:outline-none focus:ring-2 focus:ring-fuchsia-500/50 focus:border-fuchsia-500/50
                       focus:bg-[#0f172a]/80 shadow-inner transition-all placeholder:text-white/20"
              />
            </div>
          </div>

          <div class="pt-6 border-t border-white/10">
            <button
              [disabled]="saving"
              (click)="submitDetails()"
              class="w-full relative overflow-hidden group bg-gradient-to-r from-indigo-500 to-fuchsia-500 hover:from-indigo-400 hover:to-fuchsia-400 
                     text-white font-bold text-lg py-4 rounded-2xl transition-all duration-300 transform hover:-translate-y-1 hover:shadow-xl hover:shadow-indigo-500/30
                     disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
            >
              <div class="absolute inset-0 w-full h-full bg-white/20 block opacity-0 group-hover:opacity-100 group-active:opacity-0 transition-opacity"></div>
              @if (saving) {
                <span class="flex items-center justify-center">
                  <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                  Saving...
                </span>
              } @else {
                Save Details
              }
            </button>
            <div class="mt-4 text-center">
              <button [routerLink]="['/seller/image-manager', productId]" class="text-sm font-semibold text-fuchsia-400 hover:text-fuchsia-300 underline underline-offset-4">
                Or manage images for this product
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
