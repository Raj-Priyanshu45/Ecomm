<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <h1 class="text-3xl font-black text-gray-900 mb-6">Add Product</h1>

  @if (success) {
    <div class="bg-green-50 border border-green-200 text-green-800 px-5 py-4 rounded-xl mb-6 text-sm font-medium">
      ✓ Product created successfully! Redirecting…
    </div>
  }

  @if (error) {
    <div class="bg-red-50 border border-red-200 text-red-700 px-5 py-4 rounded-xl mb-6 text-sm">
      {{ error }}
    </div>
  }

  <div class="bg-white border border-gray-100 rounded-2xl p-6 space-y-4">

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Product Name *</label>
      <input [(ngModel)]="name" placeholder="e.g. Wireless Headphones"
             class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Description *</label>
      <textarea [(ngModel)]="description" rows="4" placeholder="Describe your product…"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none">
      </textarea>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Price (₹) *</label>
      <input [(ngModel)]="price" type="number" min="0" placeholder="0.00"
             class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Tags</label>
      <input [(ngModel)]="tagsInput" placeholder="electronics, wireless, audio  (comma separated)"
             class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
      <p class="text-xs text-gray-400 mt-1">Separate multiple tags with commas</p>
    </div>

    <button (click)="submit()" [disabled]="loading"
            class="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50">
      {{ loading ? 'Creating…' : 'Create Product' }}
    </button>
  </div>
</div>
