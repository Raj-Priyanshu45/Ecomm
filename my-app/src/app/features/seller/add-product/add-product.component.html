<div class="max-w-2xl mx-auto px-4 py-8">

  <h1 class="text-3xl font-bold mb-6">Add Product</h1>

  <div *ngIf="success" class="bg-green-100 text-green-700 p-3 rounded mb-4">
    Product created successfully!
  </div>

  <div *ngIf="error" class="bg-red-100 text-red-700 p-3 rounded mb-4">
    {{ error }}
  </div>

  <div class="space-y-4">

    <input [(ngModel)]="name" placeholder="Product Name"
           class="w-full border p-2 rounded" />

    <textarea [(ngModel)]="description"
              placeholder="Description"
              class="w-full border p-2 rounded"></textarea>

    <input [(ngModel)]="price" type="number"
           placeholder="Price"
           class="w-full border p-2 rounded" />

    <input [(ngModel)]="tagsInput"
           placeholder="tags: electronics, mobile"
           class="w-full border p-2 rounded" />

    <button (click)="submit()"
            [disabled]="loading"
            class="bg-indigo-600 text-white px-4 py-2 rounded w-full">
      {{ loading ? 'Creating...' : 'Create Product' }}
    </button>

  </div>
</div>
